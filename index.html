<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/face-guess.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GuessWhoDaily | Identify the notable names & faces in history</title>

    <style>
      body {
        /* font-family: sans-serif; */
        font-family: Arial, Geneva, Tahoma, sans-serif;
        text-align: center;
        /* margin: 0.5rem auto; */
        margin: 0 auto;
        padding: 4px;
      }
      img {
        max-width: 300px;
        margin: 1rem auto;
        display: block;
        transition: filter 0.5s ease;
      }

      button {
        margin: 0.5rem;
        padding: 0.5rem 1rem;
        border: none;
        background-color: black;
        color: white;
      }
      button:hover {
        cursor: pointer;
        background-color: white;
        color: black;
        border: 1px solid black;
      }
      .guessButton {
        background-color: green;
        color: white;
        border: none;
      }
      .guessButton:hover {
        background-color: white;
        color: green;
        border: 1px solid green;
      }
      input {
        padding: 6px;
        margin: 4px;
      }
      span {
        cursor: pointer;
        text-decoration: underline;
        color: brown;
      }
      /* footer {
        position: fixed;
        bottom: 5px;
        left: 10%;
        margin: 4px;
        font-size: small;
      } */
      nav {
        position: fixed;
        top: 5px;
        left: 10%;
        margin: 12px;
        font-size: small;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgb(0, 0, 0);
        background-color: rgba(0, 0, 0, 0.4);
      }

      .modal-content {
        background-color: #fefefe;
        margin: 15% auto;
        padding: 20px;
        border: 1px solid #888;
        width: 94%;
        /* height: 86vh;
        align-content: center; */
      }

      .close-button {
        color: red;
        position: absolute;
        top: 8%;
        right: 3%;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
      }

      iframe {
        overflow: auto;
        margin-right: 5%;
      }
      #loadingIframe {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        /* display: none;  */
        /* Hidden by default */
      }
      .challenge-div {
        margin-top: 6%;
      }
      .about-div {
        margin-top: 4%;
      }
      /* .img-logo {
        margin-top: 6%;
      } */
      .app-title {
        margin-top: 8%;
      }
      .dashboard-h2 {
        margin-top: 6%;
      }
      .policy-div {
        margin-top: 6%;
      }
      .history-div {
        width: 100%;
        background-color: rgb(236, 236, 228);
        padding: 6px;
        margin-top: 6%;
      }

      /** */
      #joystick {
        position: absolute;
        bottom: 20px;
        left: 20px;
        width: 120px;
        height: 120px;
        border: 2px solid #aaa;
        border-radius: 50%;
        touch-action: none;
        display: none; /* hidden by default */
      }
      #stick {
        position: absolute;
        width: 40px;
        height: 40px;
        background: #666;
        border-radius: 50%;
        left: 40px;
        top: 40px;
      }
      /** */
      .b-carousel {
        display: flex;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        width: 100%;
        text-align: center;
      }

      .b-item {
        min-width: 100%;
        height: 68px;
        padding: 8px;
        margin: 6px;
        background-color: rgb(252, 181, 169);
        scroll-snap-align: start;
      }
      .d-item {
        min-width: 100%;
        height: 68px;
        padding: 8px;
        margin: 6px;
        background-color: rgb(97, 71, 85);
        color: white;
        scroll-snap-align: start;
      }
      .e-item {
        min-width: 100%;
        height: 150px;
        padding: 8px;
        margin: 6px;
        background-color: rgb(95, 133, 101);
        color: white;
        scroll-snap-align: start;
      }

      @media screen and (max-width: 600px) {
        .challenge-div {
          margin-top: 13%;
        }
        /* .img-logo {
          margin-top: 13%;
        } */
        .app-title {
          margin-top: 20%;
        }
        .dashboard-h2 {
          margin-top: 20%;
          font-family: Arial, Helvetica, sans-serif;
        }
        .about-div {
          margin-top: 16%;
        }
        .policy-div {
          margin-top: 18%;
        }
        .history-div {
          position: absolute;
          left: 0;
          top: 10%;
        }
        #feedToHomeBtn {
          position: fixed;
          top: 5%;
          left: 3%;
          z-index: 100;
        }
      }
      /* style="position:absolute;top:5%;left:3%;z-index:100" */
    </style>
    <!-- Confetti.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
